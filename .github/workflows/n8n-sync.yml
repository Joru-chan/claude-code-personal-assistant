name: N8N Workflow Sync

on:
  workflow_dispatch:
    inputs:
      sync_direction:
        description: "Sync direction"
        required: true
        type: choice
        options:
          - push
          - pull
      workflow_name:
        description: "Workflow name (blank = all workflows)"
        required: false
        type: string
        default: ""
      auth_method:
        description: "Authentication method"
        required: false
        type: choice
        options:
          - auto
          - api_key
          - token
        default: "auto"
      debug_mode:
        description: "Enable debug output"
        required: false
        type: boolean
        default: false
      fail_on_error:
        description: "Fail job if any workflow push fails"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: n8n-workflow-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate configuration
        run: |
          set -euo pipefail
          echo "Validating configuration..."

          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required on the runner."
            exit 1
          fi

          if [ -z "${{ secrets.N8N_BASE_URL }}" ]; then
            echo "N8N_BASE_URL secret is not set"
            exit 1
          fi

          if [ -z "${{ secrets.N8N_API_KEY }}" ]; then
            echo "N8N_API_KEY secret is not set"
            exit 1
          fi

          BASE_URL="${{ secrets.N8N_BASE_URL }}"
          BASE_URL="${BASE_URL%/}"

          echo "N8N_BASE_URL_CLEAN=$BASE_URL" >> "$GITHUB_ENV"
          echo "AUTH_METHOD=${{ inputs.auth_method || 'auto' }}" >> "$GITHUB_ENV"
          echo "DEBUG_MODE=${{ inputs.debug_mode && 'true' || 'false' }}" >> "$GITHUB_ENV"
          echo "FAIL_ON_ERROR=${{ inputs.fail_on_error && 'true' || 'false' }}" >> "$GITHUB_ENV"
          echo "SYNC_DIRECTION=${{ inputs.sync_direction }}" >> "$GITHUB_ENV"
          echo "WORKFLOW_NAME_INPUT=${{ inputs.workflow_name }}" >> "$GITHUB_ENV"

          if [ "${{ inputs.debug_mode && 'true' || 'false' }}" = "true" ]; then
            echo "Debug mode enabled"
            echo "Base URL: $BASE_URL"
            echo "Auth method: ${{ inputs.auth_method || 'auto' }}"
            echo "Fail on error: ${{ inputs.fail_on_error && 'true' || 'false' }}"
          fi

      - name: Test n8n connection and detect authentication method
        run: |
          set -euo pipefail
          echo "Testing n8n connection and detecting authentication method..."

          BASE_URL="${N8N_BASE_URL_CLEAN}"
          API_KEY="${{ secrets.N8N_API_KEY }}"
          WORKING_AUTH_METHOD=""
          WORKING_AUTH_HEADER=""

          test_auth() {
            local method="$1"
            local header="$2"
            local test_name="$3"
            local http_code=""

            echo "Testing $test_name..."

            if [ "$DEBUG_MODE" = "true" ]; then
              echo "Debug request: GET $BASE_URL/api/v1/workflows"
            fi

            http_code=$(curl -sS -w '%{http_code}' -o response.json \
              -H "accept: application/json" \
              -H "$header" \
              "$BASE_URL/api/v1/workflows" || echo "000")

            echo "HTTP status: $http_code"

            if [ "$DEBUG_MODE" = "true" ] && [ -f response.json ]; then
              echo "Response body:"
              jq "." response.json 2>/dev/null || cat response.json
            fi

            if [ "$http_code" = "200" ]; then
              WORKING_AUTH_METHOD="$method"
              WORKING_AUTH_HEADER="$header"
              return 0
            fi

            return 1
          }

          if [ "$AUTH_METHOD" = "auto" ] || [ "$AUTH_METHOD" = "api_key" ]; then
            if test_auth "api_key" "X-N8N-API-KEY: $API_KEY" "API key"; then
              :
            fi
          fi

          if [ -z "$WORKING_AUTH_METHOD" ] && { [ "$AUTH_METHOD" = "auto" ] || [ "$AUTH_METHOD" = "token" ]; }; then
            if test_auth "token" "Authorization: Bearer $API_KEY" "Bearer token"; then
              :
            fi
          fi

          if [ -z "$WORKING_AUTH_METHOD" ]; then
            echo "All authentication methods failed."
            echo "Expected endpoint: $BASE_URL/api/v1/workflows"
            exit 1
          fi

          echo "WORKING_AUTH_METHOD=$WORKING_AUTH_METHOD" >> "$GITHUB_ENV"
          echo "WORKING_AUTH_HEADER=$WORKING_AUTH_HEADER" >> "$GITHUB_ENV"
          echo "Authentication method '$WORKING_AUTH_METHOD' is working."

      - name: Pull workflows from n8n
        if: inputs.sync_direction == 'pull'
        run: |
          set -euo pipefail
          echo "Pulling workflows from n8n..."

          BASE_URL="${N8N_BASE_URL_CLEAN}"
          AUTH_HEADER="${WORKING_AUTH_HEADER}"
          WORKFLOW_NAME="${WORKFLOW_NAME_INPUT}"

          mkdir -p workflows

          http_code=$(curl -sS -w '%{http_code}' -o workflows_list.json \
            -H "accept: application/json" \
            -H "$AUTH_HEADER" \
            "$BASE_URL/api/v1/workflows" || echo "000")

          if [ "$http_code" != "200" ]; then
            echo "Failed to fetch workflows list (HTTP $http_code)"
            cat workflows_list.json 2>/dev/null || true
            exit 1
          fi

          if [ "$DEBUG_MODE" = "true" ]; then
            jq "." workflows_list.json 2>/dev/null || cat workflows_list.json
          fi

          WORKFLOW_LINES=""
          if [ -n "$WORKFLOW_NAME" ]; then
            WORKFLOW_LINES=$(jq -r --arg name "$WORKFLOW_NAME" '.data[]? | select(.name == $name) | "\(.id)\t\(.name)"' workflows_list.json)
            if [ -z "$WORKFLOW_LINES" ]; then
              echo "Workflow '$WORKFLOW_NAME' was not found in n8n."
              exit 1
            fi
          else
            WORKFLOW_LINES=$(jq -r '.data[]? | "\(.id)\t\(.name)"' workflows_list.json)
          fi

          if [ -z "$WORKFLOW_LINES" ]; then
            echo "No workflows available to pull."
            exit 0
          fi

          workflow_count=0
          success_count=0

          while IFS=$'\t' read -r workflow_id workflow_name; do
            [ -z "${workflow_id:-}" ] && continue
            workflow_count=$((workflow_count + 1))
            echo "Downloading: $workflow_name (ID: $workflow_id)"

            http_code=$(curl -sS -w '%{http_code}' -o workflow_temp.json \
              -H "accept: application/json" \
              -H "$AUTH_HEADER" \
              "$BASE_URL/api/v1/workflows/$workflow_id" || echo "000")

            if [ "$http_code" = "200" ]; then
              safe_name=$(echo "$workflow_name" | sed 's/[^a-zA-Z0-9._-]/_/g')
              output_file="workflows/${safe_name}.json"
              jq "." workflow_temp.json > "$output_file" 2>/dev/null || cp workflow_temp.json "$output_file"
              echo "Saved: $output_file"
              success_count=$((success_count + 1))
            else
              echo "Failed to download workflow '$workflow_name' (HTTP $http_code)"
              cat workflow_temp.json 2>/dev/null || true
              rm -f workflow_temp.json workflows_list.json
              exit 1
            fi
          done <<< "$WORKFLOW_LINES"

          rm -f workflow_temp.json workflows_list.json
          echo "Downloaded $success_count/$workflow_count workflow(s)."

      - name: Push workflows to n8n
        if: inputs.sync_direction == 'push'
        run: |
          set -euo pipefail
          echo "Pushing workflows to n8n..."

          BASE_URL="${N8N_BASE_URL_CLEAN}"
          AUTH_HEADER="${WORKING_AUTH_HEADER}"
          WORKFLOW_NAME="${WORKFLOW_NAME_INPUT}"

          if [ ! -d "workflows" ]; then
            echo "No workflows directory found."
            exit 1
          fi

          http_code=$(curl -sS -w '%{http_code}' -o workflows_list.json \
            -H "accept: application/json" \
            -H "$AUTH_HEADER" \
            "$BASE_URL/api/v1/workflows" || echo "000")

          if [ "$http_code" != "200" ]; then
            echo "Failed to fetch existing workflows (HTTP $http_code)"
            cat workflows_list.json 2>/dev/null || true
            exit 1
          fi

          validate_workflow() {
            local file="$1"
            local errors=""

            if ! jq empty "$file" 2>/dev/null; then
              errors="${errors}invalid JSON; "
            fi

            if [ "$(jq -r '.name // empty' "$file" 2>/dev/null)" = "" ]; then
              errors="${errors}missing name; "
            fi

            if [ "$(jq -r '.nodes // empty' "$file" 2>/dev/null)" = "" ]; then
              errors="${errors}missing nodes; "
            fi

            if [ "$(jq -r '.connections // empty' "$file" 2>/dev/null)" = "" ]; then
              errors="${errors}missing connections; "
            fi

            if [ "$(jq '.nodes | length' "$file" 2>/dev/null || echo 0)" = "0" ]; then
              errors="${errors}nodes array empty; "
            fi

            if [ -n "$errors" ]; then
              echo "Validation failed for $file: $errors"
              return 1
            fi

            return 0
          }

          shopt -s nullglob
          workflow_files=(workflows/*.json)
          if [ "${#workflow_files[@]}" -eq 0 ]; then
            echo "No workflow JSON files found in workflows/."
            exit 1
          fi

          success_count=0
          total_count=0
          failed_count=0
          failed_workflows=()
          failed_reasons=()
          succeeded_workflows=()

          for workflow_file in "${workflow_files[@]}"; do
            workflow_name_from_file=$(basename "$workflow_file" .json)
            json_name=$(jq -r '.name // empty' "$workflow_file" 2>/dev/null)
            if [ -z "$json_name" ] || [ "$json_name" = "null" ]; then
              json_name="$workflow_name_from_file"
            fi

            if [ -n "$WORKFLOW_NAME" ] && [ "$workflow_name_from_file" != "$WORKFLOW_NAME" ] && [ "$json_name" != "$WORKFLOW_NAME" ]; then
              continue
            fi

            total_count=$((total_count + 1))
            echo "Processing: $workflow_name_from_file"

            if ! validate_workflow "$workflow_file"; then
              failed_count=$((failed_count + 1))
              failed_workflows+=("$workflow_name_from_file")
              failed_reasons+=("validation failed")
              if [ "$FAIL_ON_ERROR" = "true" ]; then
                break
              fi
              continue
            fi

            active_state=$(jq -r '.active // false' "$workflow_file" 2>/dev/null)

            jq '{
              name: .name,
              nodes: .nodes,
              connections: .connections,
              settings: .settings,
              staticData: .staticData,
              description: .description
            } | del(..|nulls)' "$workflow_file" > workflow_clean.json

            json_name_trimmed=$(echo "$json_name" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            existing_id=$(jq -r --arg name "$json_name_trimmed" '.data[]? | select((.name | gsub("^\\s+|\\s+$"; "")) == $name) | .id' workflows_list.json | head -n1)

            operation=""
            workflow_id=""
            if [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
              operation="UPDATE"
              workflow_id="$existing_id"
              http_code=$(curl -sS -w '%{http_code}' -o response.json -X PUT \
                -H "accept: application/json" \
                -H "$AUTH_HEADER" \
                -H "Content-Type: application/json" \
                -d @workflow_clean.json \
                "$BASE_URL/api/v1/workflows/$existing_id" || echo "000")
            else
              operation="CREATE"
              http_code=$(curl -sS -w '%{http_code}' -o response.json -X POST \
                -H "accept: application/json" \
                -H "$AUTH_HEADER" \
                -H "Content-Type: application/json" \
                -d @workflow_clean.json \
                "$BASE_URL/api/v1/workflows" || echo "000")
              if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
                workflow_id=$(jq -r '.id // empty' response.json 2>/dev/null)
              fi
            fi

            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "Workflow $operation succeeded: $json_name"

              if [ -n "$workflow_id" ]; then
                if [ "$active_state" = "true" ]; then
                  activate_code=$(curl -sS -w '%{http_code}' -o activate_response.json -X POST \
                    -H "accept: application/json" \
                    -H "$AUTH_HEADER" \
                    "$BASE_URL/api/v1/workflows/$workflow_id/activate" || echo "000")
                  if [ "$activate_code" != "200" ] && [ "$activate_code" != "204" ]; then
                    echo "Warning: activation failed for $json_name (HTTP $activate_code)"
                  fi
                else
                  deactivate_code=$(curl -sS -w '%{http_code}' -o deactivate_response.json -X POST \
                    -H "accept: application/json" \
                    -H "$AUTH_HEADER" \
                    "$BASE_URL/api/v1/workflows/$workflow_id/deactivate" || echo "000")
                  if [ "$deactivate_code" != "200" ] && [ "$deactivate_code" != "204" ]; then
                    echo "Warning: deactivation failed for $json_name (HTTP $deactivate_code)"
                  fi
                fi
              fi

              success_count=$((success_count + 1))
              succeeded_workflows+=("$workflow_name_from_file")
            else
              error_msg=$(jq -r '.message // .error // "unknown error"' response.json 2>/dev/null || echo "unknown error")
              echo "Failed to push '$json_name' (HTTP $http_code): $error_msg"
              failed_count=$((failed_count + 1))
              failed_workflows+=("$workflow_name_from_file")
              failed_reasons+=("HTTP $http_code - $error_msg")
              if [ "$FAIL_ON_ERROR" = "true" ]; then
                break
              fi
            fi
          done

          rm -f workflows_list.json response.json workflow_clean.json activate_response.json deactivate_response.json

          if [ -n "$WORKFLOW_NAME" ] && [ "$total_count" -eq 0 ]; then
            echo "Requested workflow '$WORKFLOW_NAME' was not found in local workflows/*.json."
            exit 1
          fi

          echo "Push summary: processed=$total_count success=$success_count failed=$failed_count"
          if [ "${#succeeded_workflows[@]}" -gt 0 ]; then
            echo "Succeeded: ${succeeded_workflows[*]}"
          fi
          if [ "${#failed_workflows[@]}" -gt 0 ]; then
            for i in "${!failed_workflows[@]}"; do
              echo "Failed: ${failed_workflows[$i]} (${failed_reasons[$i]})"
            done
          fi

          if [ "$failed_count" -gt 0 ] && [ "$FAIL_ON_ERROR" = "true" ]; then
            exit 1
          fi

      - name: Commit pulled workflow changes
        if: inputs.sync_direction == 'pull'
        run: |
          set -euo pipefail
          echo "Committing pulled changes..."

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add workflows/

          if git diff --staged --quiet; then
            echo "No workflow changes to commit."
            exit 0
          fi

          if [ -n "${WORKFLOW_NAME_INPUT}" ]; then
            git commit -m "Sync n8n workflow: ${WORKFLOW_NAME_INPUT}"
          else
            git commit -m "Sync all n8n workflows"
          fi

          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "Changes committed and pushed."
