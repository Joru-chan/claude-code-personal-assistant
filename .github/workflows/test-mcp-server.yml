name: Test MCP Server Integration

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  test-mcp-server:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uvicorn fastmcp
        
    - name: Verify test_server.py exists
      run: |
        if [ ! -f test_server.py ]; then
          echo "❌ ERROR: test_server.py not found in repository"
          exit 1
        fi
        echo "✅ test_server.py found"
        
    - name: Start MCP test server
      run: |
        echo "🚀 Starting MCP test server..."
        python test_server.py > /tmp/mcp-test-server.log 2>&1 &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
        echo "Started server with PID: $SERVER_PID"
        
    - name: Wait for MCP endpoint startup
      run: |
        echo "⏳ Waiting for MCP endpoint to start..."
        for i in {1..30}; do
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "❌ Server process exited before readiness check"
            cat /tmp/mcp-test-server.log || true
            exit 1
          fi
        
          STARTUP_RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" \
            -X POST http://localhost:8000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' || echo "HTTP_CODE:000")
        
          HTTP_CODE=$(echo "$STARTUP_RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
          RESPONSE_BODY=$(echo "$STARTUP_RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
        
          if [ "$HTTP_CODE" = "200" ] && echo "$RESPONSE_BODY" | grep -q '"result"'; then
            echo "✅ MCP endpoint is ready after $i seconds"
            break
          fi
        
          if [ $i -eq 30 ]; then
            echo "❌ MCP endpoint failed to become ready within 30 seconds"
            echo "Last HTTP code: $HTTP_CODE"
            echo "Last response body:"
            echo "$RESPONSE_BODY"
            cat /tmp/mcp-test-server.log || true
            exit 1
          fi
        
          echo "Waiting... attempt $i/30 (HTTP $HTTP_CODE)"
          sleep 1
        done
        
    - name: Test MCP tools/list request
      run: |
        echo "🔍 Testing MCP tools/list request..."
        MCP_RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" \
          -X POST http://localhost:8000/mcp \
          -H "Content-Type: application/json" \
          -H "Accept: application/json, text/event-stream" \
          -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' || echo "HTTP_CODE:000")
        HTTP_CODE=$(echo "$MCP_RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
        RESPONSE_BODY=$(echo "$MCP_RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
        
        echo "MCP tools/list HTTP code: $HTTP_CODE"
        echo "MCP tools/list response:"
        echo "$RESPONSE_BODY"
        
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ tools/list failed with code: $HTTP_CODE"
          exit 1
        fi
        
        if ! echo "$RESPONSE_BODY" | grep -q '"tools"'; then
          echo "❌ tools/list response missing 'tools'"
          exit 1
        fi
        
        if ! echo "$RESPONSE_BODY" | grep -q '"debug_test_tool"'; then
          echo "❌ tools/list response missing debug_test_tool"
          exit 1
        fi
        
        echo "✅ MCP tools/list working correctly"
        
    - name: Test MCP tools/call request
      run: |
        echo "🔍 Testing MCP tools/call request..."
        TOOL_RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" \
          -X POST http://localhost:8000/mcp \
          -H "Content-Type: application/json" \
          -H "Accept: application/json, text/event-stream" \
          -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"debug_test_tool","arguments":{"message":"ci-test"}}}' || echo "HTTP_CODE:000")
        HTTP_CODE=$(echo "$TOOL_RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
        RESPONSE_BODY=$(echo "$TOOL_RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
        
        echo "MCP tools/call HTTP code: $HTTP_CODE"
        echo "MCP tools/call response:"
        echo "$RESPONSE_BODY"
        
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ tools/call failed with code: $HTTP_CODE"
          exit 1
        fi
        
        if ! echo "$RESPONSE_BODY" | grep -q 'MCP Server received: ci-test'; then
          echo "❌ tools/call response missing expected tool output"
          exit 1
        fi
        
        echo "✅ MCP tools/call working correctly"
        
    - name: Test MCP route behavior
      run: |
        echo "🔍 Testing GET /mcp route behavior..."
        MCP_GET_RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" http://localhost:8000/mcp || echo "HTTP_CODE:000")
        HTTP_CODE=$(echo "$MCP_GET_RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
        RESPONSE_BODY=$(echo "$MCP_GET_RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
        
        echo "GET /mcp HTTP code: $HTTP_CODE"
        echo "GET /mcp response: $RESPONSE_BODY"
        
        if [ "$HTTP_CODE" = "405" ] || [ "$HTTP_CODE" = "406" ]; then
          echo "✅ GET /mcp returned expected code ($HTTP_CODE)"
        else
          echo "❌ GET /mcp failed with unexpected code: $HTTP_CODE"
          exit 1
        fi
        
    - name: Test Root Endpoint
      run: |
        echo "🔍 Testing root / endpoint..."
        ROOT_RESPONSE=$(curl -s -w "HTTP_CODE:%{http_code}" http://localhost:8000/ || echo "HTTP_CODE:000")
        HTTP_CODE=$(echo "$ROOT_RESPONSE" | grep -o "HTTP_CODE:[0-9]*" | cut -d: -f2)
        RESPONSE_BODY=$(echo "$ROOT_RESPONSE" | sed 's/HTTP_CODE:[0-9]*$//')
        
        echo "Root endpoint HTTP code: $HTTP_CODE"
        echo "Root endpoint response: $RESPONSE_BODY"
        
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
          echo "✅ Root endpoint responding (code $HTTP_CODE is expected)"
        else
          echo "❌ Root endpoint failed with unexpected code: $HTTP_CODE"
          exit 1
        fi
        
    - name: Comprehensive Test Summary
      run: |
        echo "🎉 =================================="
        echo "🎉 MCP SERVER INTEGRATION TEST PASSED"
        echo "🎉 =================================="
        echo ""
        echo "✅ FastMCP server started successfully"
        echo "✅ MCP tools/list request succeeded"
        echo "✅ MCP tools/call request succeeded"
        echo "✅ MCP route behavior validated"
        echo "✅ ASGI integration is working properly"
        echo ""
        echo "This means:"
        echo "• FastMCP → uvicorn integration is functional"
        echo "• MCP JSON-RPC routing is working correctly"
        echo "• Server can list and call MCP tools"
        echo "• Transport behavior matches current FastMCP semantics"
        echo ""
        echo "If deployment still fails, the issue is likely"
        echo "environment-specific (VM config, systemd, firewall, etc.)"
        echo "rather than the FastMCP app wiring itself."
        
    - name: Cleanup
      if: always()
      run: |
        if [ ! -z "$SERVER_PID" ]; then
          echo "🧹 Stopping server (PID: $SERVER_PID)"
          kill $SERVER_PID 2>/dev/null || true
          sleep 2
          kill -9 $SERVER_PID 2>/dev/null || true
        fi
        
    - name: Show server logs on failure
      if: failure()
      run: |
        echo "📋 Debugging information:"
        echo "• Python version: $(python --version)"
        echo "• Pip packages:"
        pip list | grep -E "(fastmcp|uvicorn)"
        echo "• Network connections:"
        if command -v ss > /dev/null; then
          ss -ltnp | grep :8000 || echo "No process listening on port 8000"
        elif command -v netstat > /dev/null; then
          netstat -tlnp | grep :8000 || echo "No process listening on port 8000"
        else
          echo "Neither ss nor netstat is installed"
        fi
        echo "• Server log tail:"
        tail -n 80 /tmp/mcp-test-server.log || echo "No server log file found"
        echo ""
        echo "❌ =================================="
        echo "❌ MCP SERVER INTEGRATION TEST FAILED" 
        echo "❌ =================================="
        echo ""
        echo "This indicates either:"
        echo "• FastMCP installation issues"
        echo "• Import problems with dependencies" 
        echo "• ASGI integration problems"
        echo "• Server startup failures"
        echo ""
        echo "Check the logs above for specific error messages."
